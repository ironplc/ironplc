<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="housing" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#1e2535"/>
      <stop offset="100%" stop-color="#0e1218"/>
    </radialGradient>
  </defs>

  <!-- Housing -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="url(#housing)" stroke="#2a3545" stroke-width="1"/>

  <!-- Ambient glow behind LED -->
  <circle cx="16" cy="16" r="10" fill="#ffaa22" opacity="0.15" filter="url(#glow)"/>

  <!-- LED bezel -->
  <circle cx="16" cy="16" r="8.5" fill="#1a1408" stroke="#2a2010" stroke-width="0.5"/>

  <!-- LED body -->
  <circle cx="16" cy="16" r="6.5" fill="#cc7700" filter="url(#glow-soft)"/>

  <!-- LED bright core -->
  <circle cx="16" cy="16" r="3.5" fill="#ffe0aa"/>

  <!-- Specular highlight -->
  <circle cx="13.5" cy="13.5" r="1.5" fill="#ffffff" opacity="0.35"/>
</svg>
