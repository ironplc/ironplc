<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronPLC Playground</title>
  <meta name="description" content="Write, compile, and run IEC 61131-3 Structured Text programs in your browser with the IronPLC Playground. No installation needed.">
  <link rel="canonical" href="https://playground.ironplc.com/">
  <meta property="og:title" content="IronPLC Playground">
  <meta property="og:description" content="Write, compile, and run IEC 61131-3 Structured Text programs in your browser. No installation needed.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://playground.ironplc.com/">
  <meta property="og:site_name" content="IronPLC">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="uPlot.min.css">
  <script async data-id="101424946" src="https://static.getclicky.com/js"></script>
</head>
<body>
  <header>
    <h1>IronPLC Playground</h1>
    <span class="subtitle">IEC 61131-3 in the browser</span>
  </header>

  <main>
    <section class="editor-section">
      <div class="toolbar">
        <div class="toolbar-selectors">
          <select id="examples-select" data-testid="examples-select" title="Load an example program">
            <option value="" disabled selected>Examples</option>
          </select>
          <select id="dialect-select" data-testid="dialect-select" title="IEC 61131-3 dialect">
            <option value="2003" selected>IEC 61131-3:2003</option>
            <option value="2013">IEC 61131-3:2013</option>
          </select>
          <span id="dialect-badge" data-testid="dialect-badge" class="dialect-badge"></span>
          <label title="Milliseconds between scan cycles">
            Interval (ms):
            <input id="interval-input" type="number" value="500" min="1" max="60000" data-testid="interval-input">
          </label>
        </div>
        <div class="toolbar-transport">
          <button id="start-btn" disabled data-testid="start-btn" title="Compile and start running">&#x25B6;</button>
          <button id="stop-btn" disabled data-testid="stop-btn" title="Stop and reset">&#x25A0;</button>
          <button id="pause-btn" disabled data-testid="pause-btn" title="Pause/resume execution">&#x23F8;</button>
          <span class="transport-info">
            <span id="duration-display" data-testid="duration-display">0.0s</span>
            <span class="transport-separator">|</span>
            <span id="cycles-display" data-testid="cycles-display">0 cycles</span>
          </span>
        </div>
      </div>
      <textarea id="editor" spellcheck="false" data-testid="editor">PROGRAM main
  VAR
    count : INT;
    doubled : INT;
  END_VAR

  (* Click Start to begin running. The program
     runs one scan cycle per interval. Variables
     keep their values between cycles, so count
     increases each time. *)
  count := count + 1;
  doubled := count * 2;
END_PROGRAM
</textarea>
    </section>

    <section class="output-section">
      <div class="output-tabs">
        <button class="tab active" data-tab="variables">Variables</button>
        <button class="tab" data-tab="diagnostics">Diagnostics</button>
      </div>

      <div id="variables-panel" class="panel active" data-testid="variables-panel">
        <p class="placeholder">Start a program to see variable values.</p>
      </div>

      <div id="diagnostics-panel" class="panel" data-testid="diagnostics-panel">
        <p class="placeholder">No diagnostics.</p>
      </div>
    </section>
  </main>

  <footer>
    <span id="status" data-testid="status">Loading WebAssembly…</span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
