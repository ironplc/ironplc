[package]
name = "ironplc-vm"
description = "Bytecode virtual machine for IronPLC"
version = "0.169.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
test-support = []

[dependencies]
ironplc-container = { path = "../container", version = "0.169.0" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "scan_cycle"
harness = false

[build-dependencies]
csv = "1"
