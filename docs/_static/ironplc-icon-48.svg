<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="housing" cx="38%" cy="33%" r="65%">
      <stop offset="0%"   stop-color="#1e2535"/>
      <stop offset="100%" stop-color="#0e1218"/>
    </radialGradient>
  </defs>

  <!-- Housing -->
  <rect x="1.5" y="1.5" width="45" height="45" rx="8" fill="url(#housing)" stroke="#2a3545" stroke-width="1.2"/>

  <!-- Ambient glow -->
  <circle cx="24" cy="24" r="16" fill="#ffaa22" opacity="0.14" filter="url(#glow)"/>

  <!-- LED bezel -->
  <circle cx="24" cy="24" r="13" fill="#1a1408" stroke="#2e2010" stroke-width="0.8"/>

  <!-- LED body -->
  <circle cx="24" cy="24" r="10" fill="#cc7700" filter="url(#glow-soft)"/>

  <!-- LED bright core -->
  <circle cx="24" cy="24" r="5.5" fill="#ffe0aa"/>

  <!-- Specular highlight -->
  <circle cx="20" cy="20" r="2.5" fill="#ffffff" opacity="0.30"/>
</svg>
