<svg width="400" height="64" viewBox="0 0 400 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="housing" cx="38%" cy="33%" r="65%">
      <stop offset="0%"   stop-color="#1e2535"/>
      <stop offset="100%" stop-color="#0e1218"/>
    </radialGradient>
  </defs>

  <!-- Housing -->
  <rect x="1" y="1" width="62" height="62" rx="9" fill="url(#housing)" stroke="#2a3545" stroke-width="1.2"/>

  <!-- Ambient glow -->
  <circle cx="32" cy="32" r="22" fill="#ffaa22" opacity="0.12" filter="url(#glow)"/>

  <!-- LED bezel -->
  <circle cx="32" cy="32" r="18" fill="#1a1408" stroke="#2e2010" stroke-width="0.8"/>

  <!-- LED body -->
  <circle cx="32" cy="32" r="13.5" fill="#cc7700" filter="url(#glow-soft)"/>

  <!-- LED bright core -->
  <circle cx="32" cy="32" r="7" fill="#ffe0aa"/>

  <!-- Specular highlight -->
  <circle cx="26" cy="26" r="3" fill="#ffffff" opacity="0.28"/>

  <!-- Wordmark -->
  <text x="80" y="38"
        fill="#ffffff"
        font-family="'Orbitron', 'Share Tech Mono', monospace"
        font-size="30"
        font-weight="900"
        letter-spacing="2">Iron<tspan fill="#ff6b2b">PLC</tspan></text>

  <!-- Rule -->
  <line x1="80" y1="48" x2="394" y2="48" stroke="#ff6b2b" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="80" y="59"
        fill="#3a4a5a"
        font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="3.5">IEC 61131-3 RUNTIME</text>
</svg>
