name: Playground

on:
  workflow_call:
    inputs:
      commit-ref:
        required: false
        type: string
        description: 'If not empty, then run for the specified branch name or tag'

permissions:
  contents: read

jobs:
  build-playground:
    name: Build Playground
    runs-on: ubuntu-latest
    steps:
      # Fetch input artifacts and code.
      # The validate step constrains the ref SHAPE only (release tag or
      # auto-update branch); it is a tripwire so the CodeQL untrusted-checkout
      # sink sees a sanitizer, NOT a real access control. Actual safety comes
      # from callers computing commit-ref internally and this job being
      # contents:read with no secrets. See specs/adrs/0032-ci-gating-and-secret-scoping.md.
      - name: Validate checkout ref
        if: ${{ inputs.commit-ref }}
        shell: bash
        env:
          REF: ${{ inputs.commit-ref }}
        run: |
          if [[ ! "$REF" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z]+)*|feature/AUTO-UPDATE-[0-9A-Za-z._-]+)$ ]]; then
            echo "::error::Refusing to checkout unexpected ref '$REF'"
            exit 1
          fi
      - name: Checkout ${{ inputs.commit-ref || 'triggering commit' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Empty ref => the triggering commit (former "Checkout HEAD" path).
          ref: ${{ inputs.commit-ref }}

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      # Execute build recipes
      - name: Build wasm and playground
        working-directory: ./playground
        run: just ci

      # Save artifacts
      - name: Upload playground artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ironplc-playground
          path: playground/_build
          retention-days: 5
