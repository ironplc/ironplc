name: Playground

on:
  workflow_call:
    inputs:
      source-artifact:
        required: false
        type: string
        default: ""
        description: >
          Name of a source-tree artifact (ironplc-source.tar.gz, produced
          earlier in the same run by the version or dependency-update job) to
          build instead of the commit that triggered the run. Empty => build the
          triggering commit. This lets the release/update pipelines feed build
          jobs the exact prepared tree without any job checking out a
          caller-supplied git ref. To build an arbitrary tag or commit for
          testing, run from a clone or dispatch the workflow from that ref.

permissions:
  contents: read

jobs:
  build-playground:
    name: Build Playground
    runs-on: ubuntu-latest
    steps:
      # Get the source. Neither path checks out a caller-supplied git ref, so
      # CodeQL no longer flags an untrusted checkout:
      #   * default: the commit that triggered this run, or
      #   * source-artifact: a tree prepared earlier in the same run by the
      #     version / dependency-update job.
      # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
      - name: Checkout triggering commit
        if: ${{ !inputs.source-artifact }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download prepared source tree
        if: ${{ inputs.source-artifact }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.source-artifact }}
          # Relative to the workspace; a relative path keeps the tar step below
          # portable across Linux/macOS/Windows bash (no backslash issues).
          path: source-artifact
      - name: Extract prepared source tree
        if: ${{ inputs.source-artifact }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          tar -xzf source-artifact/ironplc-source.tar.gz
          rm -rf source-artifact

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      # Execute build recipes
      - name: Build wasm and playground
        working-directory: ./playground
        run: just ci

      # Save artifacts
      - name: Upload playground artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ironplc-playground
          path: playground/_build
          retention-days: 5
