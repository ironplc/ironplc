name: Playground

on:
  # Allow triggering directly
  workflow_dispatch:
    inputs:
      commit-ref:
        required: false
        type: string
        description: 'If not empty, then run for the specified branch name or tag'

  # Allow using this workflow from another workflow
  workflow_call:
    inputs:
      commit-ref:
        required: false
        type: string
        description: 'If not empty, then run for the specified branch name or tag'

jobs:
  build-playground:
    name: Build Playground
    runs-on: ubuntu-latest
    steps:
      # Fetch input artifacts and code
      - name: Checkout branch or tag ${{ inputs.commit-ref }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        if: ${{ inputs.commit-ref }}
        with:
          ref: ${{ inputs.commit-ref }}
      - name: Checkout HEAD
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        if: ${{ !inputs.commit-ref }}

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      # Execute build recipes
      - name: Build wasm and playground
        working-directory: ./playground
        run: just ci

      # Save artifacts
      - name: Upload playground artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ironplc-playground
          path: playground/_build
          retention-days: 5
