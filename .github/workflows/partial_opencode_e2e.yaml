name: OpenCode Integration E2E
on:
  workflow_call:
    inputs:
      compiler-version:
        required: true
        type: string
        description: 'The version number to test with (without the "v" prefix). Empty string uses the latest release.'
      model:
        required: false
        type: string
        default: "llama3.2:3b"
        description: 'Ollama model used for the real-agent end-to-end test'
  # Allow running manually against any branch from the Actions tab. The bulk of
  # the test lives in the justfile, so this exercises branch changes directly.
  workflow_dispatch:
    inputs:
      compiler-version:
        required: false
        type: string
        default: ""
        description: 'The version number to test with (without the "v" prefix). Empty string uses the latest release.'
      model:
        required: false
        type: string
        default: "llama3.2:3b"
        description: 'Ollama model used for the real-agent end-to-end test'

jobs:
  opencode-e2e:
    name: OpenCode Integration E2E Job
    runs-on: ubuntu-latest
    steps:
      # Fetch input artifacts and code
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Set up Ollama
        uses: ai-action/setup-ollama@d0eb66d576e0880178be72b68b77b2dbbf5a884f # v2.0.53

      # Install the published compiler and run the OpenCode end-to-end test.
      - name: OpenCode end-to-end test
        run: just opencode-e2e "${{ inputs.compiler-version }}" "${{ inputs.model }}"
