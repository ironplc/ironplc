# Defines a weekly build for the project. Each week (or when triggered)
# create a new release (having a new release number).
#
# The essential strategy is:
#    1. Determine the next semantic version number
#    2. Update the code, create a commit with the version number, create a
#       Github release
#    3. Build the artifacts using the tag as the starting point
#    4. Check that everything actually works together
#    5. Publish the changes
#    6. clean up old artifacts

on:
  # Automatically create a release every Monday at 19:00
  schedule:
      - cron: '0 19 * * 1'
  # Allow triggering directly
  workflow_dispatch:
    inputs:
      dryrun:
        type: boolean
        description: 'If set, run as a dry run and do not create the release artifacts'
        default: true
      dryrun-test-version-override:
        type: string
        description: 'If set, provide a version number for end to end tests (instead of creating a new version for testing)'
        default: ''

name: IronPLC Deployment

# Least privilege by default: the GITHUB_TOKEN is read-only for every job.
# Only the credentialed stages (create version, upload release artifacts,
# publish) opt up to contents: write at the job level.
# See specs/adrs/0032-ci-gating-and-secret-scoping.md.
permissions:
  contents: read

jobs:
  release:
    name: Create Version Numbers and GitHub Release for the Artifacts
    # Creates the GitHub Release via GITHUB_TOKEN and pushes the version
    # commit/tag via the PAT.
    permissions:
      contents: write
    uses: ./.github/workflows/partial_version.yaml
    with:
      dryrun: ${{ !!inputs.dryrun }}
    secrets:
      IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN: ${{ secrets.IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN }}

  build-vscode-extension:
    name: Build Visual Studio Code Extension
    needs: [release]
    uses: ./.github/workflows/partial_vscode_extension.yaml
    with:
      commit-ref: ${{ needs.release.outputs.commit-tag }}
      gh-release-tag: ${{ needs.release.outputs.gh-release-tag }}
      artifact-name: ironplc-vscode-extension.vsix
      version: ${{ needs.release.outputs.version }}
    
  build-platform-package:
    name: Build Compiler and Associated Installers
    needs: [release]
    uses: ./.github/workflows/partial_compiler.yaml
    with:
      commit-ref: ${{ needs.release.outputs.commit-tag }}
      gh-release-tag: ${{ needs.release.outputs.gh-release-tag }}
      version: ${{ needs.release.outputs.version }}

  build-playground:
    name: Build Playground (WASM)
    needs: [release]
    uses: ./.github/workflows/partial_playground.yaml
    with:
      commit-ref: ${{ needs.release.outputs.commit-tag }}

  upload-release-artifacts:
    name: Upload Release Artifacts
    # Attach the credential-free build artifacts to the (already public,
    # prerelease) GitHub Release so the smoke tests can download them.
    needs: [release, build-platform-package, build-vscode-extension]
    permissions:
      contents: write
    uses: ./.github/workflows/partial_upload_release_artifacts.yaml
    with:
      dryrun: ${{ !!inputs.dryrun }}
      gh-release-tag: ${{ needs.release.outputs.gh-release-tag }}
      version: ${{ needs.release.outputs.version }}

  smoke-test:
    name: End to End Smoke Test
    # Install the components on a real machine and verify that they
    # all work together. If this passes, we have a good consistent
    # build.
    needs: [release, upload-release-artifacts]
    uses: ./.github/workflows/partial_integration_test.yaml
    if: ${{ !inputs.dryrun || inputs.dryrun-test-version-override }}
    with:
      extension-version: ${{ needs.release.outputs.version || inputs.dryrun-test-version-override }}
      compiler-version: ${{ needs.release.outputs.version || inputs.dryrun-test-version-override  }}
      ironplcc-installer-x86_64-windows-filename: "ironplcc-x86_64-windows.exe"
      ironplc-vscode-extension-filename: "ironplc-vscode-extension.vsix"
      ironplc-vscode-extension-name: "garretfick.ironplc"

  install-script-smoke-test:
    name: Install Script Smoke Test
    # Verify the curl | sh installer works against the just-published
    # release on Linux and macOS. Failing this blocks publish-website
    # (via the needs list below), so a broken install.sh cannot reach
    # https://www.ironplc.com/install.sh.
    needs: [release, upload-release-artifacts]
    uses: ./.github/workflows/partial_install_script_test.yaml
    if: ${{ !inputs.dryrun || inputs.dryrun-test-version-override }}
    with:
      compiler-version: ${{ needs.release.outputs.version || inputs.dryrun-test-version-override }}

  # TODO: Re-enable once OpenCode reliably passes in the release build.
  # The reusable workflow (.github/workflows/partial_opencode_e2e.yaml) is
  # retained but is no longer wired into the deployment pipeline.
  # opencode-e2e-test:
  #   name: OpenCode Integration E2E Test
  #   # Install the just-published compiler and verify the ironplcmcp MCP server
  #   # works with the OpenCode agent: a connectivity check plus a real-agent run
  #   # against a local Ollama model.
  #   needs: [release, publish-prerelease]
  #   uses: ./.github/workflows/partial_opencode_e2e.yaml
  #   if: ${{ !inputs.dryrun || inputs.dryrun-test-version-override }}
  #   with:
  #     compiler-version: ${{ needs.release.outputs.version || inputs.dryrun-test-version-override }}
  #     model: "llama3.2:3b"

  playground-e2e-test:
    name: Playground E2E Test
    # Run browser-based E2E tests against the built playground before publishing.
    # Consumes the playground build artifact, not the GitHub Release.
    needs: [build-playground]
    uses: ./.github/workflows/partial_playground_e2e.yaml

  publish-website:
    name: Build and Publish Website
    # The website doesn't depend on these but we don't publish
    # if those are failing so we depend on those. In particular,
    # install-script-smoke-test must pass before we publish the
    # docs site, because the site serves install.sh.
    needs: [release, smoke-test, install-script-smoke-test, playground-e2e-test]
    # peaceiris/actions-gh-pages pushes the gh-pages branch via GITHUB_TOKEN.
    permissions:
      contents: write
    uses: ./.github/workflows/partial_website.yaml
    with:
      publish: ${{ !inputs.dryrun }}
      commit-ref: ${{ needs.release.outputs.commit-tag }}

  publish-release:
    name: Publish Release
    needs: [release, publish-website]
    runs-on: ubuntu-latest
    # Scopes VS_MARKETPLACE_TOKEN, OVSX_PAT to deployments from main.
    # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
    environment: production
    # irongut/EditRelease flips the release to latest via GITHUB_TOKEN.
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./integrations/vscode
    steps:
      # Checkout the repository/fetch input artifacts
      - name: Checkout tag ${{ needs.release.outputs.commit-tag }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ needs.release.outputs.commit-tag }}
        with:
          ref: ${{ needs.release.outputs.commit-tag  }}
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !needs.release.outputs.commit-tag }}
      - name: Download VSIX Build Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ironplc-vscode-extension.vsix
          path: ./integrations/vscode
      
      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      # Execute build recipes
      - name: Install dependencies
        run: just setup
      # TODO: Restore once the ironplc publisher and ironplc.ironplc
      # extension are reinstated on the Visual Studio Marketplace.
      # The publisher was blocked and the extension removed by Microsoft;
      # publish attempts return RequestBlockedException (VSID/Concurrency)
      # until the listing is restored. Users install via the GitHub
      # release VSIX in the meantime (see docs/quickstart/installation.rst).
      # - name: Publish VS Code Extension to Marketplace
      #   if: ${{ !inputs.dryrun }}
      #   run: just publish ironplc-vscode-extension.vsix
      #   env:
      #     VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
      - name: Publish VS Code Extension to Open VSX
        if: ${{ !inputs.dryrun }}
        run: just publish-openvsx ironplc-vscode-extension.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # Save artifacts
      - name: Publish GitHub Release
        if: ${{ !inputs.dryrun }}
        uses: irongut/EditRelease@ccf529ad26dddf9996e7dd0f24ca5da4ea507cc2 # v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          id: ${{ needs.release.outputs.gh-release-id }}
          prerelease: false
          makeLatest: true

  publish-playground:
    name: Publish Playground to playground.ironplc.com
    needs: [release, publish-release]
    runs-on: ubuntu-latest
    # Scopes IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN to deployments from main.
    # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
    environment: production
    steps:
      - name: Download playground artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ironplc-playground
          path: ./playground-dist

      - name: Add CNAME for custom domain
        run: echo "playground.ironplc.com" > ./playground-dist/CNAME

      - name: Publish to ironplc/ironplc-playground repository
        if: ${{ !inputs.dryrun }}
        uses: peaceiris/actions-gh-pages@4a2e02b36f31d8974a0d09d3bb9f3172aa2d0d0d # v3
        with:
          publish_branch: main
          external_repository: ironplc/ironplc-playground
          personal_token: ${{ secrets.IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN }}
          publish_dir: ./playground-dist
          force_orphan: false
          allow_empty_commit: false

  publish-homebrew:
    name: Publish Homebrew Tap
    needs: [release, publish-release]
    runs-on: ubuntu-latest
    # Scopes IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN to deployments from main.
    # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
    environment: production
    defaults:
      run:
        working-directory: ./compiler
    steps:
      # Fetch input artifacts and code
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !inputs.dryrun }}
        with:
          ref: ${{ needs.release.outputs.commit-tag }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.dryrun }}

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just

      # Execute build recipes
      - name: Build Homebrew repository
        run: just publish ${{ needs.release.outputs.version }} ironplcc-x86_64-macos.tar.gz ironplcc-x86_64-linux-musl.tar.gz

      # Save artifacts
      - name: Copy to Homebrew Tap Repository
        if: ${{ !inputs.dryrun }}
        uses: peaceiris/actions-gh-pages@4a2e02b36f31d8974a0d09d3bb9f3172aa2d0d0d # v3
        with:
          publish_branch: main
          external_repository: ironplc/homebrew-brew
          personal_token: ${{secrets.IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN}}
          # The action doesn't seem to respect the working directory
          publish_dir: compiler/target/homebrew
          force_orphan: false
          allow_empty_commit: false

  cleanup:
    name: Cleanup Old Artifacts
    needs: [publish-homebrew, publish-playground]
    runs-on: ubuntu-latest
    # eregon/keep-last-n-releases deletes old releases/tags via GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      # Execute build recipes
      - name: Cleanup Drafts and Old Release
        if: ${{ !inputs.dryrun }}
        uses: eregon/keep-last-n-releases@3ac06d4bedebd0e96890db1a32e14841d1794d04 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          n: 52
          remove_tags_without_release: true


      