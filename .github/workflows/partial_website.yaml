name: Website
on:
  workflow_call:
    inputs:
      publish:
        required: true
        type: boolean
        description: 'If set true, then publish the website'
      source-artifact:
        required: false
        type: string
        default: ""
        description: >
          Name of a source-tree artifact (ironplc-source.tar.gz, produced
          earlier in the same run by the version or dependency-update job) to
          build instead of the commit that triggered the run. Empty => build the
          triggering commit. This lets the release/update pipelines feed build
          jobs the exact prepared tree without any job checking out a
          caller-supplied git ref. To build an arbitrary tag or commit for
          testing, run from a clone or dispatch the workflow from that ref.

# No workflow-level permissions block: this reusable workflow inherits the
# GITHUB_TOKEN permissions granted by each caller's job. A reusable workflow
# cannot request more than the caller grants, so declaring contents: write here
# would force every caller (including build-only ones) to grant write. Instead,
# the publish caller (deployment.yaml's publish-website job) opts up to
# contents: write, while build-only callers (integration.yaml, update.yaml)
# inherit the default contents: read and skip the publish step (publish: false).
# See specs/adrs/0032-ci-gating-and-secret-scoping.md.

jobs:
  docs:
    name: Documentation Job
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      # Get the source. Neither path checks out a caller-supplied git ref, so
      # CodeQL no longer flags an untrusted checkout:
      #   * default: the commit that triggered this run, or
      #   * source-artifact: a tree prepared earlier in the same run by the
      #     version / dependency-update job.
      # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
      - name: Checkout triggering commit
        if: ${{ !inputs.source-artifact }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download prepared source tree
        if: ${{ inputs.source-artifact }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.source-artifact }}
          # Relative to the workspace; a relative path keeps the tar step below
          # portable across Linux/macOS/Windows bash (no backslash issues).
          path: source-artifact
      - name: Extract prepared source tree
        if: ${{ inputs.source-artifact }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          tar -xzf source-artifact/ironplc-source.tar.gz
          rm -rf source-artifact

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - name: Set up Python 3.x
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      # Execute build recipes
      - name: Build docs
        run: just ci

      # Save artifacts
      - name: Publish by Copying Build to gh-pages branch
        if: ${{ inputs.publish }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The action doesn't seem to respect the working directory
          publish_dir: docs/_build
          force_orphan: false
          allow_empty_commit: false
