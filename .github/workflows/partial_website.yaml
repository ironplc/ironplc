name: Website
on:
  workflow_call:
    inputs:
      publish:
        required: true
        type: boolean
        description: 'If set true, then publish the website'
      commit-ref:
        required: false
        type: string
        description: 'If not empty, then run for the specified branch name or tag'

# No workflow-level permissions block: this reusable workflow inherits the
# GITHUB_TOKEN permissions granted by each caller's job. A reusable workflow
# cannot request more than the caller grants, so declaring contents: write here
# would force every caller (including build-only ones) to grant write. Instead,
# the publish caller (deployment.yaml's publish-website job) opts up to
# contents: write, while build-only callers (integration.yaml, update.yaml)
# inherit the default contents: read and skip the publish step (publish: false).
# See specs/adrs/0032-ci-gating-and-secret-scoping.md.

jobs:
  docs:
    name: Documentation Job
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      # Fetch input artifacts and code
      - name: Checkout branch or tag ${{ inputs.commit-ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.commit-ref }}
        with:
          ref: ${{ inputs.commit-ref  }}
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !inputs.commit-ref }}

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - name: Set up Python 3.x
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      # Execute build recipes
      - name: Build docs
        run: just ci

      # Save artifacts
      - name: Publish by Copying Build to gh-pages branch
        if: ${{ inputs.publish }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The action doesn't seem to respect the working directory
          publish_dir: docs/_build
          force_orphan: false
          allow_empty_commit: false
