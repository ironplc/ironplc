name: VS Code Extension
on:
  workflow_call:
    inputs:
      source-artifact:
        required: false
        type: string
        default: ""
        description: >
          Name of a source-tree artifact (ironplc-source.tar.gz, produced
          earlier in the same run by the version or dependency-update job) to
          build instead of the commit that triggered the run. Empty => build the
          triggering commit. This lets the release/update pipelines feed build
          jobs the exact prepared tree without any job checking out a
          caller-supplied git ref. To build an arbitrary tag or commit for
          testing, run from a clone or dispatch the workflow from that ref.
      gh-release-tag:
        required: false
        type: string
        description: 'The Github Release tag to publish to'
      artifact-name:
        required: false
        type: string
        description: 'The name of the VSIX artifact to create'
      install-deps:
        required: false
        type: boolean
        default: false
      version:
        required: false
        type: string
        default: "0.0.0"
        description: "The version number, such as 1.2.3"

# Build jobs never write to the repository or a release. They only produce
# build artifacts (via actions/upload-artifact, which needs no contents:write).
# The consolidated upload-release-artifacts job attaches them to the release.
# See specs/adrs/0032-ci-gating-and-secret-scoping.md.
permissions:
  contents: read

jobs:
  vscode-extension:
    name: Visual Studio Code Extension Job
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integrations/vscode
    steps:
      # Checkout the repository/fetch input artifacts.
      # Get the source. Neither path checks out a caller-supplied git ref, so
      # CodeQL no longer flags an untrusted checkout:
      #   * default: the commit that triggered this run, or
      #   * source-artifact: a tree prepared earlier in the same run by the
      #     version / dependency-update job.
      # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
      - name: Checkout triggering commit
        if: ${{ !inputs.source-artifact }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download prepared source tree
        if: ${{ inputs.source-artifact }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.source-artifact }}
          # Relative to the workspace; a relative path keeps the tar step below
          # portable across Linux/macOS/Windows bash (no backslash issues).
          path: source-artifact
      - name: Extract prepared source tree
        if: ${{ inputs.source-artifact }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          tar -xzf source-artifact/ironplc-source.tar.gz
          rm -rf source-artifact

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          cache-dependency-path: './integrations/vscode/package-lock.json'
          node-version-file: './integrations/vscode/package.json'
      # Applies when using act to run locally
      - name: Install X server components and Xvfb
        run: sudo apt update && sudo apt install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libgtk-3-0 libgbm1 libasound2 xvfb
        if: ${{ inputs.install-deps }}

      # Execute build recipe
      - name: Install dependencies
        run: just setup
      - name: Build and Test
        run: just ci
      - name: Create VSIX package
        run: just package ironplc-vscode-extension.vsix

      - name: Generate SBOM
        run: just sbom ${{ inputs.version }}

      # Save output artifacts. These upload only to build-artifact storage (no
      # credential required); the consolidated upload-release-artifacts job
      # attaches them to the GitHub Release. Uploaded unconditionally (not gated
      # on gh-release-tag) so a deployment dry run still produces them.
      - name: Upload SBOM to build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ironplc-vscode-extension-sbom
          path: |
            integrations/vscode/bom.cdx.json
            integrations/vscode/bom.cdx.json.sha256
          if-no-files-found: error
          retention-days: 5
      - name: Upload VSIX to build artifact
        if: ${{ inputs.artifact-name }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: integrations/vscode/ironplc-vscode-extension.vsix
          if-no-files-found: error
