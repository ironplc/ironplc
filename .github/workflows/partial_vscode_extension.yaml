name: VS Code Extension
on:
  workflow_call:
    inputs:
      commit-ref:
        required: false
        type: string
        description: 'If not empty, then run for the specified branch name or tag'
      gh-release-tag:
        required: false
        type: string
        description: 'The Github Release tag to publish to'
      artifact-name:
        required: false
        type: string
        description: 'The name of the VSIX artifact to create'
      marketplace-artifact-name:
        required: false
        type: string
        description: 'The name of the Visual Studio Marketplace VSIX (ironplc.ironplc-vscode) build artifact to create. When empty the Marketplace VSIX is still packaged (build validation) but not uploaded.'
      install-deps:
        required: false
        type: boolean
        default: false
      version:
        required: false
        type: string
        default: "0.0.0"
        description: "The version number, such as 1.2.3"

# Build jobs never write to the repository or a release. They only produce
# build artifacts (via actions/upload-artifact, which needs no contents:write).
# The consolidated upload-release-artifacts job attaches them to the release.
# See specs/adrs/0032-ci-gating-and-secret-scoping.md.
permissions:
  contents: read

jobs:
  vscode-extension:
    name: Visual Studio Code Extension Job
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integrations/vscode
    steps:
      # Checkout the repository/fetch input artifacts
      - name: Checkout tag ${{ inputs.commit-ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.commit-ref }}
        with:
          ref: ${{ inputs.commit-ref }}
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !inputs.commit-ref }}

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          cache-dependency-path: './integrations/vscode/package-lock.json'
          node-version-file: './integrations/vscode/package.json'
      # Applies when using act to run locally
      - name: Install X server components and Xvfb
        run: sudo apt update && sudo apt install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libgtk-3-0 libgbm1 libasound2 xvfb
        if: ${{ inputs.install-deps }}

      # Execute build recipe
      - name: Install dependencies
        run: just setup
      - name: Build and Test
        run: just ci
      - name: Create VSIX package
        run: just package ironplc-vscode-extension.vsix

      - name: Generate SBOM
        run: just sbom ${{ inputs.version }}

      # Package the Visual Studio Marketplace build (extension ID
      # ironplc.ironplc-vscode) to validate that Marketplace packaging works
      # end-to-end in CI. This runs unconditionally so every build proves the
      # package builds; the VSIX is uploaded as a build artifact only when
      # marketplace-artifact-name is set (see below) and is never published:
      # automated Marketplace publishing (Stage 2 of
      # specs/plans/vscode-marketplace-extension-id.md) is deferred until the new
      # listing is validated by hand. Runs after the Open VSX VSIX and the SBOM
      # so its package.json `name` override does not affect those artifacts.
      - name: Create Marketplace VSIX package
        run: just package-marketplace ironplc-vscode-extension-marketplace.vsix

      # Save output artifacts. These upload only to build-artifact storage (no
      # credential required); the consolidated upload-release-artifacts job
      # attaches them to the GitHub Release. Uploaded unconditionally (not gated
      # on gh-release-tag) so a deployment dry run still produces them.
      - name: Upload SBOM to build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ironplc-vscode-extension-sbom
          path: |
            integrations/vscode/bom.cdx.json
            integrations/vscode/bom.cdx.json.sha256
          if-no-files-found: error
          retention-days: 5
      - name: Upload VSIX to build artifact
        if: ${{ inputs.artifact-name }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: integrations/vscode/ironplc-vscode-extension.vsix
          if-no-files-found: error
      # Marketplace VSIX (ironplc.ironplc-vscode), uploaded as a separate build
      # artifact. The consolidated upload-release-artifacts job attaches it to
      # the GitHub Release so users can install the Marketplace build manually.
      # Automated publishing to the Marketplace remains deferred.
      - name: Upload Marketplace VSIX to build artifact
        if: ${{ inputs.marketplace-artifact-name }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.marketplace-artifact-name }}
          path: integrations/vscode/ironplc-vscode-extension-marketplace.vsix
          if-no-files-found: error
          retention-days: 5
