name: IronPLC Compiler
on:
  workflow_call:
    inputs:
      commit-ref:
        required: false
        type: string
        description: 'If not empty, then run for the specified tag'
      gh-release-tag:
        required: false
        type: string
        default: ""
        description: 'The Github Release tag to publish to (empty value disables publishing)'
      version:
        required: false
        type: string
        default: "0.0.0"
        description: "The version number, such as 1.2.3"

jobs:
  compiler-sbom:
    name: Compiler SBOM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./compiler
    steps:
      - name: Checkout branch or tag ${{ inputs.commit-ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.commit-ref }}
        with:
          ref: ${{ inputs.commit-ref }}
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !inputs.commit-ref }}

      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      - name: Install SBOM tools
        run: just setup-sbom

      - name: Generate SBOM
        run: just sbom ${{ inputs.version }}

      - name: Upload SBOM as build artifact (for matrix consumption)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ironplc-compiler-sbom
          path: |
            compiler/bom.cdx.json
            compiler/bom.cdx.json.sha256
          if-no-files-found: error

      - name: Upload SBOM to GitHub Release
        if: ${{ inputs.gh-release-tag }}
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          tag: ${{ inputs.gh-release-tag }}
          asset_name: ironplc-compiler-${{ inputs.version }}.cdx.json
          file: compiler/bom.cdx.json
      - name: Upload SBOM SHA256 to GitHub Release
        if: ${{ inputs.gh-release-tag }}
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          tag: ${{ inputs.gh-release-tag }}
          asset_name: ironplc-compiler-${{ inputs.version }}.cdx.json.sha256
          file: compiler/bom.cdx.json.sha256

  compiler:
    name: Build Compiler and Associated Installers
    needs: [compiler-sbom]
    runs-on:  ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./compiler
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-2025
            artifact: ironplcc-x86_64-windows.exe
            rust_target: x86_64-pc-windows-msvc
          - os: windows-2025
            artifact: ironplcc-aarch64-windows.exe
            rust_target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            artifact: ironplcc-x86_64-linux-musl.tar.gz
            rust_target: x86_64-unknown-linux-musl
          - os: macos-latest
            artifact: ironplcc-x86_64-macos.tar.gz
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            artifact: ironplcc-aarch64-macos.tar.gz
            rust_target: aarch64-apple-darwin

    steps:
      # Checkout the repository/fetch input artifacts
      - name: Checkout branch or tag ${{ inputs.commit-ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.commit-ref }}
        with:
          ref: ${{ inputs.commit-ref  }}
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !inputs.commit-ref }}

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          components: rustfmt, clippy
          target: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "compiler -> target"
          # Include target triple in cache key for cross-compilation
          key: ${{ matrix.rust_target }}
      - uses: taiki-e/install-action@03e268b84870ac3cfa58a44d9b504511b732a857 # cargo-llvm-cov
      - name: Install cargo-dupes
        run: cargo install cargo-dupes
      - name: Cache NSIS
        if: ${{ matrix.os == 'windows-2025' }}
        id: cache-nsis
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: 'C:\Program Files (x86)\NSIS'
          # Bump the suffix (v1 -> v2, etc.) to force a fresh NSIS install
          key: ${{ runner.os }}-nsis-v1
      - name: Install NSIS
        if: ${{ matrix.os == 'windows-2025' }}
        shell: powershell
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\NSIS\Bin\makensis.exe")) {
            choco install nsis --no-progress
          } else {
            Write-Host "NSIS restored from cache"
          }
        
      # Fetch the workspace SBOM produced by compiler-sbom so the
      # package step can embed it inside the tarball / NSIS installer.
      - name: Download SBOM for embedding
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ironplc-compiler-sbom
          path: compiler/

      # Execute build recipe
      - name: Build the Compiler
        run: just ci
      - name: Create installer package
        run: just package ${{ inputs.version }} ${{ matrix.artifact }} ${{ matrix.rust_target }}

      # Save output artifacts
      - name: Upload Compiler Installer to Build Artifacts
        if: ${{ inputs.gh-release-tag }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: compiler/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload Compiler Installer SHA256 to Build Artifacts
        if: ${{ inputs.gh-release-tag }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}.sha256
          path: compiler/${{ matrix.artifact }}.sha256
          if-no-files-found: error
      - name: Upload Compiler Installer to GitHub Release
        if: ${{ inputs.gh-release-tag }}
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          tag: ${{ inputs.gh-release-tag }}
          asset_name: ${{ matrix.artifact }}
          file: compiler/${{ matrix.artifact }}
      - name: Upload Compiler Installer SHA256 to GitHub Release
        if: ${{ inputs.gh-release-tag }}
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          tag: ${{ inputs.gh-release-tag }}
          asset_name: ${{ matrix.artifact }}.sha256
          file: compiler/${{ matrix.artifact }}.sha256
