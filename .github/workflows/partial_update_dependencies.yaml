name: Update Dependencies
on:
  workflow_call:
    inputs:
      dryrun:
        type: boolean
        description: 'If set, run as a dry run and do not create the branch'
        default: true

      branch-name:
        type: string
        description: 'The name of the branch that will contain the updated dependencies'

    secrets:
      IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN:
        required: true

    outputs:
      branch-name:
        description: 'A commit reference that contains the updated dependencies'
        value: ${{ jobs.update-dependencies.outputs.branch-name }}

      source-artifact:
        description: >
          Name of the uploaded source-tree artifact (ironplc-source.tar.gz) that
          contains the dependency update. Build jobs consume this instead of
          checking out the update branch.
        value: ${{ jobs.update-dependencies.outputs.source-artifact }}

# Pushes via the PAT configured on checkout, not GITHUB_TOKEN, so the
# GITHUB_TOKEN stays read-only here.
permissions:
  contents: read

jobs:
    update-dependencies:
        name: Update Dependencies

        runs-on: ubuntu-latest
        # Scopes IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN to deployments from
        # main; PR-triggered workflows cannot reach this secret.
        # See specs/adrs/0032-ci-gating-and-secret-scoping.md.
        environment: production

        outputs:
          branch-name: ${{ inputs.branch-name }}
          # Source-tree artifact handed to the build jobs.
          source-artifact: ironplc-source

        steps:
          # Checkout the repository including the tags
          - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            with:
              fetch-depth: 0
              # This is a workaround for branch protections. In general, we want to
              # protect branches from changes, but we'll take the publish as special
              # because we need to create a new version number. This allows making
              # changes to the repository without removing the branch protections.
              token: ${{secrets.IRONPLC_WORKFLOW_PUBLISH_ACCESS_TOKEN}}

          # Configure the execution environment
          - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just
          - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
          - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

          # Execute build recipe
          - name: Update dependencies
            run: just update
          # Commit locally in all cases so the archive below captures the update
          # even on a dry run; the push to the remote stays gated on a real run.
          - name: Commit branch to repository
            run: just commit-branch "Continuous Integration" "garretfick@users.noreply.github.com" ${{ inputs.branch-name }} "Update dependencies"

          # Hand the updated tree to the build jobs as an artifact so no build
          # job checks out the update branch (removes the CodeQL
          # untrusted-checkout finding). HEAD is the commit created just above.
          - name: Archive updated source tree
            run: git archive --format=tar HEAD | gzip -c > "${{ runner.temp }}/ironplc-source.tar.gz"
          - name: Upload updated source tree
            uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
            with:
              name: ironplc-source
              path: ${{ runner.temp }}/ironplc-source.tar.gz
              if-no-files-found: error

          - name: Push commit to the repository
            if: ${{ !inputs.dryrun }}
            run: |
              git push --set-upstream origin ${{ inputs.branch-name }}
