name: End to End Smoke Test
on:
  workflow_call:
    inputs:
      extension-version:
        required: true
        type: string
        description: 'The version number to test with (without the "v" prefix)'

      compiler-version:
        required: true
        type: string
        description: 'Usually the version number to test with (without the "v" prefix)'

      ironplcc-installer-x86_64-windows-filename:
        required: true
        type: string
        description: "File name of the IronPLC compiler installer artifact from GitHub releases"

      ironplc-vscode-extension-filename:
        required: true
        type: string
        description: "File name of the VS Code Extension artifact from GitHub releases"

      ironplc-vscode-extension-name:
        required: true
        type: string
        description: "The identifier for the Visual Studio Code extension"

      stage-artifacts:
        required: false
        type: boolean
        default: false
        description: "If set, download the compiler installer and VSIX build artifacts from this run and run the end-to-end test against them instead of the public GitHub release. Enables testing before the release is published (e.g. while it is still a draft)."

permissions:
  contents: read

jobs:
  endtoend:
    name: End to End Smoke Test Job
    runs-on: windows-2025

    steps:
      # Fetch input artifacts and code
      - name: Checkout HEAD
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Configure the execution environment
      - uses: taiki-e/install-action@01159adff8f38113be7211e869405f6f6abf02d7 # just

      # When testing before publish, stage this run's compiler installer and
      # VSIX build artifacts into ./smoke-assets so the end-to-end test can use
      # them instead of the (not-yet-public) release.
      - name: Stage compiler installer artifact
        if: ${{ inputs.stage-artifacts }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.ironplcc-installer-x86_64-windows-filename }}
          path: ./smoke-assets
      - name: Stage VSIX artifact
        if: ${{ inputs.stage-artifacts }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.ironplc-vscode-extension-filename }}
          path: ./smoke-assets

      # Execute build recipes. With stage-artifacts, the end-to-end test uses
      # the staged local artifacts; otherwise it downloads from the public
      # GitHub release.
      - name: End to end test
        run: just endtoend-smoke ${{ inputs.compiler-version }} ${{ inputs.ironplcc-installer-x86_64-windows-filename }} ${{ inputs.extension-version }} ${{ inputs.ironplc-vscode-extension-filename }} ${{ inputs.ironplc-vscode-extension-name }} "${{ inputs.stage-artifacts && 'smoke-assets' || '' }}"
